<!DOCTYPE html>
<html>
<head>
  <title>Draw & Guess Game</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #eaeaea;
      font-family: Arial;
    }

    .room-join {
      text-align: center;
      padding: 10px;
      background: white;
    }

    .app {
      display: flex;
      height: 90vh;
      width: 95%;
      max-width: 1400px;
      margin: auto;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .board-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .toolbar {
      height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #f5f5f5;
    }

    #gameInfo {
      padding: 10px;
      font-weight: bold;
      color: blue;
      text-align: center;
    }

    canvas {
      flex: 1;
      background: white;
    }

    .chat-section {
      width: 300px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #ccc;
      padding: 10px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      padding: 10px;
      border-radius: 6px;
    }

    .input-area {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    input {
      flex: 1;
      padding: 8px;
    }

    button {
      padding: 8px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .system {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="room-join">
  <input id="roomInput" placeholder="Room ID">
  <button onclick="joinRoom()">Join</button>
</div>

<div id="gameInfo"></div>

<div class="app">

  <div class="board-section">

    <div class="toolbar">
      🎨 <input type="color" id="colorPicker">
      🖌️ <input type="range" id="brushSize" min="1" max="10" value="2">
      <button onclick="setEraser()">Eraser</button>
      <button onclick="clearBoard()">Clear</button>
    </div>

    <canvas id="board"></canvas>
  </div>

  <div class="chat-section">
    <div id="chat"></div>

    <div class="input-area">
      <input id="msg" placeholder="Type message...">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io("http://localhost:3000");

let currentRoom = "";

// JOIN ROOM
function joinRoom() {
    const room = document.getElementById("roomInput").value;
    if (!room) return;

    currentRoom = room;
    socket.emit("joinRoom", room);
}

// GAME INFO
socket.on("yourWord", (word) => {
    document.getElementById("gameInfo").innerText = "Your word: " + word;
});

socket.on("message", (msg) => {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.classList.add("system");
    div.textContent = msg;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
});

// CANVAS
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// TOOLS
let color = "#000";
let brushSize = 2;
let isEraser = false;

document.getElementById("colorPicker").oninput = e => {
    color = e.target.value;
    isEraser = false;
};

document.getElementById("brushSize").oninput = e => {
    brushSize = e.target.value;
};

function setEraser() {
    isEraser = true;
}

// DRAW
let drawing = false;

canvas.onmousedown = () => {
    drawing = true;
    ctx.beginPath();
};

canvas.onmouseup = () => drawing = false;

canvas.onmousemove = (e) => {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    ctx.strokeStyle = isEraser ? "white" : color;
    ctx.lineWidth = brushSize;
    ctx.lineCap = "round";

    ctx.lineTo(x, y);
    ctx.stroke();

    socket.emit("draw", { x, y, color, brushSize, isEraser });
};

socket.on("draw", (data) => {
    ctx.strokeStyle = data.isEraser ? "white" : data.color;
    ctx.lineWidth = data.brushSize;
    ctx.lineCap = "round";

    ctx.lineTo(data.x, data.y);
    ctx.stroke();
});

// CLEAR
function clearBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    socket.emit("clear");
}

socket.on("clear", () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
});

// CHAT
function sendMsg() {
    if (!currentRoom) {
        alert("Join a room first!");
        return;
    }

    const input = document.getElementById("msg");
    const msg = input.value;

    if (!msg.trim()) return;

    socket.emit("chat", msg);
    input.value = "";
}

socket.on("chat", (msg) => {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.textContent = msg;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
